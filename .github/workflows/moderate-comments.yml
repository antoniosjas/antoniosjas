name: Moderar Comentários do Utterances

on:
  issue_comment:
    types: [created]

jobs:
  check-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Rodar script de moderação
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = './bad_words.json';
            
            // Lê a lista de palavras proibidas
            const badWords = JSON.parse(fs.readFileSync(path, 'utf8'));

            // Texto do comentário
            const comment = context.payload.comment.body.toLowerCase();
            const comment_id = context.payload.comment.id;
            const issue_number = context.payload.issue.number;
            const { owner, repo } = context.repo;

            // Verifica se o comentário contém palavra proibida
            if (badWords.some(word => comment.includes(word))) {
              // Deleta comentário
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id
              });

              // Opcional: adiciona label 'spam' na issue
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['spam']
              });
            }
